<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AI 주식 분석기 - 실시간 기술적 분석 및 AI 리포트</title>
  <meta name="description" content="AI 기반 실시간 주식 분석기. 기술적 지표, 차트 분석, Gemini AI 투자 리포트를 제공합니다.">
  <meta property="og:title" content="AI 주식 분석기">
  <meta property="og:description" content="AI 기반 실시간 주식 분석 및 기술적 지표 리포트">
  <meta property="og:type" content="website">
  <meta name="theme-color" content="#4f6ef7">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
  <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <!-- 헤더 -->
    <header class="header">
      <h1>AI 주식 <span class="accent">분석기</span></h1>
      <div class="header-actions">
        <button class="icon-btn" id="darkModeBtn" onclick="toggleDarkMode()" title="다크모드 (D)">🌙</button>
        <button class="icon-btn" id="watchlistToggle" onclick="toggleWatchlist()" title="워치리스트 (W)">☆</button>
        <button class="icon-btn" id="historyToggle" onclick="toggleHistoryPanel()" title="분석 이력">📋</button>
      </div>
    </header>

    <!-- 워치리스트 패널 -->
    <div id="watchlistPanel" class="watchlist-panel hidden">
      <div class="watchlist-header">
        <h3>워치리스트</h3>
        <button class="icon-btn small" onclick="toggleWatchlist()">✕</button>
      </div>
      <div id="watchlistItems" class="watchlist-items">
        <p class="watchlist-empty">즐겨찾기한 종목이 없습니다</p>
      </div>
    </div>

    <!-- 분석 이력 패널 -->
    <div id="historyPanel" class="history-panel hidden">
      <div class="history-header">
        <h3>분석 이력</h3>
        <div>
          <button class="icon-btn small" onclick="clearHistory()" title="전체 삭제">🗑️</button>
          <button class="icon-btn small" onclick="toggleHistoryPanel()">✕</button>
        </div>
      </div>
      <div id="historyItems" class="history-items">
        <p class="watchlist-empty">분석 이력이 없습니다</p>
      </div>
    </div>

    <!-- 검색 -->
    <div class="search-section">
      <div class="search-box">
        <input type="text" id="symbolInput" placeholder="종목명 또는 코드 (예: 삼성전자, AAPL)" autocomplete="off">
        <button id="searchBtn" onclick="analyzeStock()">분석</button>
      </div>

      <!-- 비교 모드 -->
      <div class="compare-row" id="compareRow">
        <label class="compare-toggle">
          <input type="checkbox" id="compareMode" onchange="toggleCompareMode()">
          <span>종목 비교</span>
        </label>
        <div class="compare-inputs hidden" id="compareInputs">
          <input type="text" id="compareSymbol" placeholder="비교 종목 (예: SK하이닉스)" class="compare-input" onkeydown="if(event.key==='Enter')addCompareSymbol()">
          <button class="compare-add-btn" onclick="addCompareSymbol()">추가</button>
          <div class="compare-chips" id="compareChips"></div>
        </div>
      </div>

      <div class="quick-tags">
        <span onclick="setSymbol('005930')">삼성전자</span>
        <span onclick="setSymbol('000660')">SK하이닉스</span>
        <span onclick="setSymbol('AAPL')">Apple</span>
        <span onclick="setSymbol('TSLA')">Tesla</span>
        <span onclick="setSymbol('NVDA')">NVIDIA</span>
      </div>
      <div class="shortcut-hint">/ 검색 &middot; D 다크모드 &middot; W 워치리스트</div>
    </div>

    <!-- 프로그레스 바 -->
    <div id="progressBar" class="progress-bar hidden">
      <div class="progress-steps">
        <div class="progress-step" data-step="data"><span class="step-dot"></span><span class="step-label">데이터</span></div>
        <div class="progress-step" data-step="indicator"><span class="step-dot"></span><span class="step-label">지표</span></div>
        <div class="progress-step" data-step="news"><span class="step-dot"></span><span class="step-label">뉴스</span></div>
        <div class="progress-step" data-step="ai"><span class="step-dot"></span><span class="step-label">AI 분석</span></div>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    </div>

    <!-- 에러 -->
    <div id="error" class="error hidden">
      <span id="errorText"></span>
      <button class="retry-btn" onclick="retryAnalysis()">다시 시도</button>
    </div>

    <!-- 결과 영역 -->
    <div id="result" class="result hidden">

      <!-- 종목 헤더 -->
      <div class="stock-header" id="stockSummary"></div>

      <!-- 종합 스코어 -->
      <div class="signal-score-section hidden" id="signalScoreSection">
        <div class="signal-score-box">
          <div class="signal-score-label">종합 투자 스코어</div>
          <div class="signal-score-gauge">
            <svg viewBox="0 0 120 70" class="score-gauge-svg">
              <path d="M 10 65 A 50 50 0 0 1 110 65" fill="none" stroke="var(--border)" stroke-width="8" stroke-linecap="round"/>
              <path d="M 10 65 A 50 50 0 0 1 110 65" fill="none" stroke="var(--accent)" stroke-width="8" stroke-linecap="round" id="scoreArc" stroke-dasharray="0 157"/>
            </svg>
            <div class="signal-score-value" id="signalScoreValue">--</div>
          </div>
          <div class="signal-score-desc" id="signalScoreDesc">분석 중...</div>
        </div>
      </div>

      <!-- 기간 수익률 -->
      <div class="period-return-bar hidden" id="periodReturn"></div>

      <!-- 환율 정보 (해외 종목) -->
      <div class="exchange-rate-bar hidden" id="exchangeRateBar"></div>

      <!-- 섹션 탭 바 -->
      <div class="section-tabs" id="sectionTabs">
        <button class="section-tab active" data-target="chartArea">차트</button>
        <button class="section-tab" data-target="infoArea">시세</button>
        <button class="section-tab" data-target="indicatorArea">지표</button>
        <button class="section-tab" data-target="newsArea">뉴스</button>
        <button class="section-tab" data-target="analysisArea">AI분석</button>
      </div>

      <!-- 차트 영역 -->
      <div class="chart-section" id="chartArea">
        <div class="chart-top-bar">
          <div class="chart-legend" id="chartLegend">
            <span class="legend-item" data-ma="5" title="클릭하여 토글">
              <span class="legend-dot" style="background:#f59e0b"></span><span>5</span>
            </span>
            <span class="legend-item" data-ma="20" title="클릭하여 토글">
              <span class="legend-dot" style="background:#3b82f6"></span><span>20</span>
            </span>
            <span class="legend-item" data-ma="60" title="클릭하여 토글">
              <span class="legend-dot" style="background:#8b5cf6"></span><span>60</span>
            </span>
            <span class="legend-item" data-ma="120" title="클릭하여 토글">
              <span class="legend-dot" style="background:#ef4444"></span><span>120</span>
            </span>
            <span class="legend-sep">|</span>
            <span class="legend-item" data-overlay="bb" title="볼린저밴드 토글">
              <span class="legend-dot" style="background:#26a69a"></span><span>BB</span>
            </span>
            <span class="legend-item" data-overlay="sr" title="지지/저항선 토글">
              <span class="legend-dot" style="background:#ff9800"></span><span>S/R</span>
            </span>
          </div>
          <button class="icon-btn small" onclick="screenshotChart()" title="차트 캡처">📷</button>
        </div>
        <!-- 크로스헤어 툴팁 -->
        <div class="crosshair-tooltip hidden" id="crosshairTooltip"></div>
        <div id="priceChart" class="chart"></div>
        <div id="volumeChart" class="volume-chart"></div>
        <div id="macdChart" class="macd-chart"></div>

        <!-- 비교 차트 -->
        <div id="compareChart" class="compare-chart hidden"></div>

        <div class="period-selector">
          <button class="period-btn" data-period="5d">5일</button>
          <button class="period-btn" data-period="1mo">1개월</button>
          <button class="period-btn" data-period="3mo">3개월</button>
          <button class="period-btn" data-period="6mo">6개월</button>
          <button class="period-btn active" data-period="1y">1년</button>
          <button class="period-btn" data-period="2y">2년</button>
          <button class="period-btn" data-period="5y">5년</button>
          <button class="period-btn" data-period="10y">10년</button>
        </div>
      </div>

      <!-- 52주 범위 + 시세 정보 -->
      <div id="infoArea">
        <div class="range-section" id="rangeSection"></div>
        <div class="info-table" id="infoTable"></div>
      </div>

      <!-- 기술적 지표 카드 -->
      <div class="indicators-wrapper" id="indicatorArea">
        <div class="indicators-grid" id="indicatorsGrid"></div>
      </div>

      <!-- 뉴스 섹션 -->
      <div id="newsArea">
        <div class="news-section hidden" id="newsSection">
          <h3 class="news-title">관련 뉴스</h3>
          <div id="newsList" class="news-list"></div>
        </div>
      </div>

      <!-- AI 분석 -->
      <div id="analysisArea">
        <div class="analysis-section hidden" id="analysisSection">
          <div class="analysis-header">
            <h2>AI 분석 리포트</h2>
            <div class="analysis-actions">
              <button class="re-analyze-btn" onclick="screenshotAnalysis()" title="리포트 캡처">📷</button>
              <button id="exportBtn" class="re-analyze-btn" onclick="exportAnalysis()" title="PDF 내보내기">📄</button>
              <button id="reAnalyzeBtn" class="re-analyze-btn" onclick="reAnalyze()">재분석</button>
            </div>
          </div>
          <div id="analysisContent" class="analysis-content"></div>
        </div>
      </div>
    </div>

    <!-- 푸터 -->
    <footer class="app-footer">
      <p>본 서비스는 투자 권유가 아닌 참고 자료입니다. 투자 판단의 책임은 본인에게 있습니다.</p>
      <p class="footer-sub">AI 주식 분석기 &middot; Powered by Gemini AI &middot; Data from Yahoo Finance</p>
    </footer>
  </div>

  <!-- 지표 설명 팝업 -->
  <div class="indicator-popup hidden" id="indicatorPopup">
    <div class="indicator-popup-content">
      <div class="indicator-popup-header">
        <h4 id="popupTitle"></h4>
        <button class="icon-btn small" onclick="closeIndicatorPopup()">✕</button>
      </div>
      <div id="popupBody" class="indicator-popup-body"></div>
    </div>
  </div>

  <!-- 토스트 -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- 맨 위로 -->
  <button class="scroll-top-btn hidden" id="scrollTopBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

  <script src="app.js"></script>
</body>
</html>
